version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jaypurloom_postgres
    restart: always
    environment:
      POSTGRES_DB: jaypurloom_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jaypurloom_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jaypurloom_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgrespassword123@postgres:5432/jaypurloom_db?schema=public
      JWT_SECRET: supersecret_jaypurloom_luxury_jwt_key_2026
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      RAZORPAY_KEY_ID: rzp_test_demo_key_id
      RAZORPAY_KEY_SECRET: rzp_test_demo_key_secret
      CLOUDINARY_CLOUD_NAME: demo_cloud
      CLOUDINARY_API_KEY: 123456789
      CLOUDINARY_API_SECRET: demo_secret
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    command: /bin/sh -c "npx prisma db push && npx ts-node prisma/seed.ts && node dist/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jaypurloom_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: jaypurloom_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
